name: EvoKB Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2am

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Fetch raw data
        run: |
          mkdir -p raw
          # TODO: Replace with actual data fetch
          # git clone --depth 1 https://github.com/alphapebble/playbooks.git raw/
          echo "# Placeholder - fetch from external source" > raw/placeholder.md
      
      - name: Compile raw to wiki
        run: python3 -c "
from pathlib import Path
from evokb.retriever import compile_to_wiki
for f in Path('raw').glob('*.md'):
    compile_to_wiki(f, Path('wiki'))
"
        
      - name: Run tests
        run: python3 -m pytest tests/ -q

  eval:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Fetch raw data
        run: |
          mkdir -p raw
          echo "# Placeholder" > raw/placeholder.md
      
      - name: Compile raw to wiki
        run: python3 -c "
from pathlib import Path
from evokb.retriever import compile_to_wiki
for f in Path('raw').glob('*.md'):
    compile_to_wiki(f, Path('wiki'))
"
        
      - name: Run evaluation
        run: python3 test_accuracy.py
        
      - name: Update eval README
        run: python3 -c "
import json
with open('eval/metrics.json') as f:
    m = json.load(f)
with open('eval/README.md', 'w') as f:
    f.write(f'''# Evaluation Results

## Metrics
- Q&A Accuracy: {m.get('qa_accuracy', 0):.1%}
- Search MRR: {m.get('search_mrr', 0):.1%}

Last updated: {m.get('timestamp', 'N/A')}
''')
"

      - name: Commit eval updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update evaluation metrics"
          file_pattern: eval/*
