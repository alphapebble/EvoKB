name: EvoKB Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install litellm fastapi watchdog pytest beautifulsoup4 trafilatura requests

      - name: Run full tests
        run: python -m pytest tests/ -q --tb=short

      - name: Run evaluation
        run: python test_accuracy.py

      - name: Update eval README
        run: python scripts/update_readme.py

      - name: Commit eval updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update evaluation metrics"
          file_pattern: eval/*

  autoreview:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install litellm fastapi watchdog pytest beautifulsoup4 trafilatura requests

      - name: Run autoreview loop
        run: python run_autoreview.py --iterations 2

      - name: Commit wiki improvements
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Autoreview: improve wiki content"
          file_pattern: wiki/*
