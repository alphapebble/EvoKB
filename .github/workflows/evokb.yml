name: EvoKB Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch raw data
        run: |
          mkdir -p raw
          echo "# Placeholder" > raw/placeholder.md

      - name: Compile raw to wiki
        run: python3 scripts/compile.py

      - name: Run tests
        run: python3 -m pytest tests/ -q

  eval:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch raw data
        run: |
          mkdir -p raw
          echo "# Placeholder" > raw/placeholder.md

      - name: Compile raw to wiki
        run: python3 scripts/compile.py

      - name: Run evaluation
        run: python3 test_accuracy.py

      - name: Update eval README
        run: python3 scripts/update_readme.py

      - name: Commit eval updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update evaluation metrics"
          file_pattern: eval/*
