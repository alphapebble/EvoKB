version: '3.8'

services:
  # EvoKB API Server
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./raw:/app/raw
      - ./wiki:/app/wiki
      - ./clusters:/app/clusters
    environment:
      - MODEL=${MODEL:-ollama/llama3.2}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # EvoKB Librarian (auto-compiles raw -> wiki)
  librarian:
    build: .
    command: python -m evokb.agents.librarian
    volumes:
      - ./raw:/app/raw
      - ./wiki:/app/wiki
      - ./clusters:/app/clusters
    environment:
      - MODEL=${MODEL:-ollama/llama3.2}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    restart: unless-stopped
    depends_on:
      - api

  # Ollama (LLM backend)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
